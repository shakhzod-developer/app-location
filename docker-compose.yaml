services:
  tile38:
    image: tile38/tile38:latest
    container_name: tile38-tracking
    ports:
      - "9851:9851"
    volumes:
      - tile38_data:/data
    restart: unless-stopped

  ydb: 
    image: ydbplatform/local-ydb:latest
    container_name: ydb-historical
    platform: linux/amd64
    hostname: localhost
    ports:
      - "2135:2135"
      - "2136:2136"
      - "8765:8765"
    environment:
      - GRPC_TLS_PORT=2135
      - GRPC_PORT=2136
      - MON_PORT=8765
      - YDB_USE_IN_MEMORY_PDISKS=true
    volumes:
      - ydb_data:/ydb_data
      - ydb_certs:/ydb_certs
    restart: unless-stopped

volumes:
  tile38_data:
  ydb_data:
  ydb_certs:
